nding at the university will not be impacted based on your decision of whether or not to participate. You can skip any survey questions that you do not want to answer unless the question is related to ensuring data quality. Even if you start the survey, you are not required to complete it. You can stop at any time. Please do not include your name or other information that could be used to identify you in the survey responses.<br>\n<br>\n<strong>POTENTIAL BENEFITS: </strong>There are typically no direct benefits to you from participating in minimal risk research aside from compensation.<br>\n<br>\n<strong>RISK: </strong>This study is believed to impose little risk to participants. You have the right to skip questions you do not wish to answer or to stop participating in the research at any point. Although we have procedures in place designed to protect your identifying information that meets data privacy standards, a potential risk to you is a breach of your confidentiality should a data breach occur. If this were to happen, it is possible that others could learn your private information. The survey results will be stored in our password-protected UW-Madison Lab account and/or on an encrypted laptop, and only approved personnel will have access to it.<br>\n<br>\n<strong>CONFIDENTIALITY/ DATA PROTECTION: </strong>All your answers will be confidential and information that could identify you will not be shared with anyone outside the research team. The survey platform we are using collects IP addresses, geolocation data, and information about VPN use. These data will be stored indefinitely and may be used in future studies. Please note that because your personal identification is not linked to your survey responses, we will not be able to withdraw your data once it is submitted. After completion of the study, a finalized version of the de-identified data will be stored on the Open Science Framework, an online data repository where researchers outside of the study team will be able to access it. Data collected in this study may also be used in future studies without additional informed consent. By participating, you are agreeing to your identifiable data being used in future studies.<br>\n<br>\n<strong>COMPENSATION: </strong>There is no compensation for participating in this study.<br>\n<br>\n<strong>CONTACT: </strong>Participating in this study is voluntary. Please contact Abbie Clapp at <a href=\"mailto:arclapp@wisc.edu\">arclapp@wisc.edu</a> or Dr. Buttrick at <a href=\"http://nbuttrick@wisc.edu\">nbuttrick@wisc.edu</a> with questions about this study. If you have any questions about your rights as a research participant or have complaints about the research study or study team, call the confidential research compliance line at 1-833-652-2506. Staff will work with you to address concerns about research participation and assist in resolving problems.<br>\n<br>\n<strong>CONSENT:</strong> By clicking on the consent button, you are agreeing to participate in this study. Research participation is voluntary and even by consenting now you may reconsider your involvement at any time and decline to continue participating.</div>"}},"NextAnswerId":1,"NextChoiceId":4,"QuestionID":"QID26","QuestionType":"MC","Selector":"SAVR","SubSelector":"TX","SurveyLanguage":"EN","Validation":{"Settings":{"ForceResponse":"ON","Type":"None"}}}},"NextButton":true,"PreviousButton":false,"Count":1,"Skipped":0,"NotDisplayed":0,"LanguageSelector":null,"Messages":{"PoweredByQualtrics":"Powered by Qualtrics","PoweredByQualtricsLabel":"Powered by Qualtrics: Learn more about Qualtrics in a new tab","A11yNextPage":"You are on the next page","A11yPageLoaded":"Page Loaded","A11yPageLoading":"Page is loading","A11yPrevPage":"You are on the previous page","FailedToReachServer":"We were unable to connect to our servers. Please check your internet connection and try again.","ConnectionError":"Connection Error","IPDLError":"Sorry, an unexpected error occurred.","Retry":"Re
